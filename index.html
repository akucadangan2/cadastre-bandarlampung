<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>WebGIS Cadastre 3D - Kolaborasi Realtime (Lite)</title>
    
    <!-- MENGGUNAKAN CDN YANG LEBIH STABIL (JSDELIVR & CLOUDFLARE) -->
    <!-- Turf.js (Untuk hitung luas otomatis) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    
    <!-- Maplibre GL JS (Mesin rendering basemap) -->
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <!-- Deck.GL (Mesin rendering poligon 3D) -->
    <script src="https://cdn.jsdelivr.net/npm/deck.gl@9.0.3/dist.min.js"></script>
    
    <!-- Firebase (Database) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #tooltip { position: absolute; z-index: 1; pointer-events: none; background: rgba(0, 0, 0, 0.9); color: white; padding: 12px; border-radius: 6px; font-size: 13px; display: none; border: 1px solid #444; }
        #ui-panel { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(25, 25, 25, 0.9); padding: 15px; border-radius: 8px; border: 1px solid #444; color: white; backdrop-filter: blur(5px); width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        #edit-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; color: white; padding: 25px; border-radius: 10px; z-index: 100; border: 1px solid #555; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #edit-modal h3 { margin-top: 0; color: #00c8ff; border-bottom: 1px solid #444; padding-bottom: 10px; display: flex; justify-content: space-between;}
        #edit-modal label { display: block; margin: 10px 0 5px; font-size: 13px; color: #ccc;}
        #edit-modal input, #edit-modal select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { background: #ffaa00; color: #111; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 5px; }
        button:hover { background: #ffcc00; }
        .btn-blue { background: #008CBA; color: white; }
        .btn-blue:hover { background: #007bb5; }
        .btn-red { background: #f44336; color: white; }
        .btn-red:hover { background: #da190b; }
        select.basemap-select { width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; margin-top: 5px; margin-bottom: 15px; }
        #sync-status { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; background: #ffaa00; color: #111; margin-bottom: 10px;}
        .legend { margin-top: 15px; font-size: 12px; border-top: 1px solid #444; padding-top: 10px;}
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; margin-right: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="tooltip"></div>
    
    <div id="ui-panel">
        <h3 style="margin: 0 0 5px 0; font-size: 16px;">Editor 3D Cadastre</h3>
        <p style="margin: 5px 0 10px 0; font-size: 12px; color: #aaa;">Kolaborasi Real-time aktif.</p>
        
        <div id="sync-status">Menghubungkan Database...</div>

        <label style="font-size: 12px; font-weight: bold; color: #00c8ff;">Pilih Peta Dasar:</label>
        <select id="basemap-selector" class="basemap-select" onchange="changeBasemap()">
            <option value="dark">Carto Dark (Gelap)</option>
            <option value="satellite">Citra Satelit (ESRI)</option>
            <option value="light">Carto Light (Terang)</option>
        </select>
        
        <div id="total-bangunan" style="font-size: 13px; margin-bottom: 15px; color: #00ffaa;">Memuat data spasial...</div>

        <button onclick="downloadUpdatedData()">💾 Download Hasil Akhir</button>

        <div class="legend">
            <div style="margin-bottom: 8px; font-weight: bold; color:#ccc;">Legenda Bangunan:</div>
            <div class="legend-item"><div class="color-box" style="background: #ffcc00;"></div>Permukiman / Default</div>
            <div class="legend-item"><div class="color-box" style="background: #ff3333;"></div>Sekolah / Pendidikan</div>
            <div class="legend-item"><div class="color-box" style="background: #3388ff;"></div>Komersial / Bisnis</div>
            <div class="legend-item"><div class="color-box" style="background: #aa33ff;"></div>Pemerintahan</div>
            <div class="legend-item"><div class="color-box" style="background: #33ff88;"></div>Fasilitas Umum</div>
        </div>
    </div>

    <div id="edit-modal">
        <h3>Edit Bangunan <span id="modal-id-text" style="font-size: 10px; color:#555;"></span></h3>
        <label>Nomor Induk Bidang (NIB):</label>
        <input type="text" id="input-nib" placeholder="Contoh: 08010101...">
        <label>Tinggi Bangunan (meter):</label>
        <input type="number" id="input-tinggi" step="0.1">
        <label>Luas Bangunan (m²): <span style="font-size: 10px; color:#ffcc00;">*Dihitung otomatis jika 0</span></label>
        <input type="number" id="input-luas" step="0.1">
        <label>Fungsi Bangunan:</label>
        <select id="input-fungsi">
            <option value="Permukiman">Permukiman</option>
            <option value="Sekolah">Sekolah / Pendidikan</option>
            <option value="Komersial">Komersial / Bisnis</option>
            <option value="Pemerintahan">Pemerintahan</option>
            <option value="Fasum">Fasilitas Umum</option>
        </select>
        <div class="btn-group">
            <button class="btn-blue" onclick="saveBuildingData()">Simpan ke Cloud</button>
            <button class="btn-red" onclick="closeEditModal()">Batal</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCrKjd0u-g6612xjh37Ib808ZZTS3CN7Q",
            authDomain: "electric-armor-432617-k8.firebaseapp.com",
            databaseURL: "https://electric-armor-432617-k8-default-rtdb.firebaseio.com", 
            projectId: "electric-armor-432617-k8",
            storageBucket: "electric-armor-432617-k8.firebasestorage.app",
            messagingSenderId: "542873343960",
            appId: "1:542873343960:web:068a3b615d09374f6f04ad",
            measurementId: "G-SG9MGH4BKR"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const syncStatus = document.getElementById('sync-status');
        firebase.database().ref('.info/connected').on('value', function(snap) {
            if (snap.val() === true) {
                syncStatus.innerText = "🟢 Tersambung (Realtime)";
                syncStatus.style.background = "#4CAF50";
                syncStatus.style.color = "white";
            } else {
                syncStatus.innerText = "🔴 Disconnected";
                syncStatus.style.background = "#f44336";
                syncStatus.style.color = "white";
            }
        });

        let updateCounter = 0;
        let buildingData = null;        
        let batasData = null; 
        let selectedFeature = null;

        const BASEMAPS = {
            dark: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            light: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
            satellite: { version: 8, sources: { esri: { type: 'raster', tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize: 256 } }, layers: [{ id: 'satellite', type: 'raster', source: 'esri' }] }
        };

        const deckgl = new deck.DeckGL({
            container: 'map',
            mapStyle: BASEMAPS.dark,
            initialViewState: { longitude: 105.3055, latitude: -5.3625, zoom: 15, pitch: 55, bearing: 0 },
            controller: true,
            layers: [] 
        });

        function changeBasemap() { deckgl.setProps({ mapStyle: BASEMAPS[document.getElementById('basemap-selector').value] }); }

        function getBuildingColor(fungsi) {
            const f = fungsi ? fungsi.toLowerCase() : '';
            if (f.includes('sekolah') || f.includes('pendidikan')) return [255, 51, 51, 230]; 
            if (f.includes('komersial') || f.includes('bisnis')) return [51, 136, 255, 230];  
            if (f.includes('pemerintahan')) return [170, 51, 255, 230]; 
            if (f.includes('fasum') || f.includes('umum')) return [51, 255, 136, 230]; 
            return [255, 204, 0, 220]; 
        }

        async function loadData() {
            try {
                // Fetch data dari file geojson lokal (pastikan path-nya benar di GitHub)
                const [batasRes, bangunanRes] = await Promise.all([
                    fetch('./batas_kecamatan.geojson'),
                    fetch('./export_lod1_dengan_tinggi.geojson') 
                ]);

                if (!batasRes.ok || !bangunanRes.ok) throw new Error("Gagal mengambil data GeoJSON. Cek apakah nama file sudah persis sama.");

                batasData = await batasRes.json();
                buildingData = await bangunanRes.json();

                // Beri ID unik
                buildingData.features.forEach((bgn, index) => {
                    bgn.properties._id = `bgn_sumurbandung_${index}`; 
                });

                document.getElementById('total-bangunan').innerText = `Total Bangunan: ${buildingData.features.length}`;

                db.ref('edits_bandar_lampung').on('value', (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        buildingData.features.forEach(bgn => {
                            const id = bgn.properties._id;
                            if (cloudData[id]) { Object.assign(bgn.properties, cloudData[id]); }
                        });
                        updateCounter++; 
                        updateMap(); 
                    }
                });

                updateMap(); 

            } catch (error) {
                console.error("Terjadi Kesalahan:", error);
                document.getElementById('total-bangunan').innerText = "Gagal memuat peta. Cek Console.";
                document.getElementById('total-bangunan').style.color = "red";
            }
        }

        loadData();

        function updateMap() {
            const layers = [];

            if (batasData && batasData.features) {
                layers.push(new deck.GeoJsonLayer({
                    id: 'batas-area', data: batasData,
                    filled: true, getFillColor: [0, 200, 255, 20], stroked: true, getLineColor: [0, 200, 255, 255], lineWidthMinPixels: 2, pickable: false 
                }));
            }

            if (buildingData && buildingData.features) {
                layers.push(new deck.GeoJsonLayer({
                    id: 'bangunan-3d', data: buildingData, 
                    filled: true, extruded: true, wireframe: true, opacity: 0.9,
                    getElevation: d => parseFloat(d.properties.height_m) || 3, 
                    getFillColor: d => getBuildingColor(d.properties.fungsi), 
                    getLineColor: [255, 255, 255, 80], 
                    autoHighlight: true, highlightColor: [255, 255, 255, 150], pickable: true,
                    updateTriggers: { getElevation: updateCounter, getFillColor: updateCounter },
                    
                    onHover: info => {
                        const tooltip = document.getElementById('tooltip');
                        if (info.object) {
                            const p = info.object.properties;
                            let luas = p.luas_bangunan;
                            if(!luas) { try { luas = turf.area(info.object).toFixed(2); } catch (e) { luas = "0"; } }
                            
                            tooltip.style.display = 'block';
                            tooltip.style.left = info.x + 15 + 'px'; tooltip.style.top = info.y + 15 + 'px';
                            tooltip.style.innerHTML = `
                                <div style="color: #00c8ff; font-weight: bold; margin-bottom: 5px;">Data Bangunan</div>
                                <b>NIB:</b> ${p.NIB || '<i>Belum ada</i>'}<br/>
                                <b>Fungsi:</b> ${p.fungsi || 'Permukiman'}<br/>
                                <b>Tinggi:</b> ${p.height_m || 0} meter<br/>
                                <b>Luas:</b> ${luas} m²<br/>
                                <i style="font-size: 11px; color: #ffaa00; margin-top: 5px; display:block;">Klik untuk edit</i>
                            `;
                        } else { tooltip.style.display = 'none'; }
                    },
                    onClick: info => { if (info.object) openEditModal(info.object); }
                }));
            }
            deckgl.setProps({ layers: layers });
        }

        function openEditModal(feature) {
            selectedFeature = feature;
            const p = feature.properties;
            let calculatedArea = 0;
            try { calculatedArea = turf.area(feature).toFixed(2); } catch (e) {}

            document.getElementById('modal-id-text').innerText = `(ID: ${p._id})`;
            document.getElementById('input-nib').value = p.NIB || '';
            document.getElementById('input-tinggi').value = p.height_m || '';
            document.getElementById('input-luas').value = p.luas_bangunan || calculatedArea;
            
            const fungsiSelect = document.getElementById('input-fungsi');
            if(p.fungsi) {
                let found = Array.from(fungsiSelect.options).some(opt => opt.value === p.fungsi);
                fungsiSelect.value = found ? p.fungsi : 'Permukiman';
            } else { fungsiSelect.value = 'Permukiman'; }

            document.getElementById('edit-modal').style.display = 'block';
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; selectedFeature = null; }

        function saveBuildingData() {
            if (!selectedFeature) return;
            const id = selectedFeature.properties._id;
            const updatedProps = {
                NIB: document.getElementById('input-nib').value,
                height_m: parseFloat(document.getElementById('input-tinggi').value) || 0,
                luas_bangunan: parseFloat(document.getElementById('input-luas').value) || 0,
                fungsi: document.getElementById('input-fungsi').value
            };

            db.ref('edits_bandar_lampung/' + id).update(updatedProps)
                .then(() => { closeEditModal(); })
                .catch((error) => { alert("Gagal menyimpan ke Cloud."); });
        }

        function downloadUpdatedData() {
            if (!buildingData) return alert("Data belum siap!");
            const cleanData = JSON.parse(JSON.stringify(buildingData));
            db.ref('edits_bandar_lampung').once('value').then((snapshot) => {
                const cloudData = snapshot.val();
                cleanData.features.forEach((bgn, index) => {
                     const tempId = `bgn_sumurbandung_${index}`;
                     if(cloudData && cloudData[tempId]) { Object.assign(bgn.properties, cloudData[tempId]); }
                     delete bgn.properties._id; 
                });
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cleanData));
                const a = document.createElement('a');
                a.href = dataStr; a.download = "hasil_kadaster_kolaborasi_final.geojson";
                document.body.appendChild(a); a.click(); a.remove();
            });
        }
    </script>
</body>
</html>
