<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGIS Cadastre 3D - Pro Version</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/deck.gl@9.0.3/dist.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        /* Panel Utama */
        #ui-panel { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(25, 25, 25, 0.9); padding: 15px; border-radius: 12px; border: 1px solid #444; color: white; backdrop-filter: blur(10px); width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        
        /* Modal Edit */
        #edit-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; color: white; padding: 25px; border-radius: 12px; z-index: 100; border: 1px solid #555; width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #edit-modal h3 { margin-top: 0; color: #00c8ff; border-bottom: 1px solid #444; padding-bottom: 10px; }
        #edit-modal label { display: block; margin: 10px 0 5px; font-size: 13px; color: #ccc;}
        #edit-modal input, #edit-modal select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #555; background: #111; color: white; box-sizing: border-box; font-size: 14px;}
        
        /* Tooltip & Utilities */
        #tooltip { position: absolute; z-index: 1; pointer-events: none; background: rgba(0, 0, 0, 0.9); color: white; padding: 12px; border-radius: 6px; font-size: 13px; display: none; border: 1px solid #444; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { background: #ffaa00; color: #111; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 5px; font-size: 14px;}
        button:hover { background: #ffcc00; }
        .btn-blue { background: #008CBA; color: white; }
        .btn-blue:hover { background: #007bb5; }
        .btn-red { background: #f44336; color: white; }
        .btn-red:hover { background: #da190b; }
        .btn-green { background: #4CAF50; color: white; }
        .btn-green:hover { background: #45a049; }
        select.basemap-select { width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 6px; margin-top: 5px; margin-bottom: 10px; }
        
        /* Status & Tracking */
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 5px; width: 100%; box-sizing: border-box; text-align: center;}
        #online-users-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; margin-bottom: 15px; font-size: 12px; border: 1px solid #444;}
        
        /* Panel Khusus Mode Gambar */
        #draw-panel { display: none; background: rgba(255, 60, 60, 0.1); border: 1px solid #f44336; padding: 10px; border-radius: 8px; margin-top: 15px; text-align: center; }
        #draw-panel p { margin: 0 0 10px 0; font-size: 12px; color: #ffcccc; }

        /* --- RESPONSIVE MOBILE TWEAKS --- */
        @media (max-width: 600px) {
            #ui-panel { width: 90%; left: 5%; top: 10px; max-height: 40vh; padding: 12px; box-sizing: border-box; }
            /* Ubah modal jadi bottom-sheet di HP agar mudah diketik pakai jempol */
            #edit-modal { top: auto; bottom: 0; left: 0; transform: none; width: 100%; border-radius: 20px 20px 0 0; box-sizing: border-box; padding: 20px; padding-bottom: 40px; }
            .legend { display: none; } /* Sembunyikan legenda di HP agar hemat ruang */
            .btn-group { flex-direction: column; gap: 5px;}
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="tooltip"></div>
    
    <div id="ui-panel">
        <h3 style="margin: 0 0 5px 0; font-size: 16px;">Editor 3D Cadastre Pro</h3>
        
        <div id="sync-status" class="status-badge" style="background: #ffaa00; color: #111;">Menghubungkan Server...</div>
        
        <div id="online-users-box">
            <b style="color:#00ffaa;">User Aktif:</b>
            <div id="online-users-list" style="color:#ccc; margin-top:3px;">Memuat...</div>
        </div>

        <select id="basemap-selector" class="basemap-select" onchange="changeBasemap()">
            <option value="satellite">Citra Satelit (ESRI)</option>
            <option value="dark">Carto Dark (Gelap)</option>
            <option value="light">Carto Light (Terang)</option>
        </select>
        
        <div id="total-bangunan" style="font-size: 13px; margin-bottom: 10px; color: #00c8ff;">Memproses data...</div>

        <button onclick="downloadUpdatedData()">💾 Download GeoJSON Final</button>
        <button class="btn-blue" onclick="toggleDrawMode()" id="btn-draw" style="margin-top: 15px;">✏️ Digitasi Bangunan Baru</button>

        <div id="draw-panel">
            <p>Klik di peta untuk membuat titik poligon. Minimal 3 titik.</p>
            <div style="display: flex; gap: 5px;">
                <button class="btn-green" onclick="finishDrawing()">✅ Selesai</button>
                <button class="btn-red" onclick="cancelDrawing()">❌ Batal</button>
            </div>
        </div>

        <div class="legend">
            <div style="margin-bottom: 8px; font-weight: bold; color:#ccc; font-size: 12px; border-top: 1px solid #444; padding-top: 10px; margin-top: 15px;">Legenda:</div>
            <div style="font-size:11px; display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <div><span style="display:inline-block; width:10px; height:10px; background:#ffcc00; margin-right:5px;"></span>Permukiman</div>
                <div><span style="display:inline-block; width:10px; height:10px; background:#ff3333; margin-right:5px;"></span>Pendidikan</div>
                <div><span style="display:inline-block; width:10px; height:10px; background:#3388ff; margin-right:5px;"></span>Komersial</div>
                <div><span style="display:inline-block; width:10px; height:10px; background:#33ff88; margin-right:5px;"></span>Fasum</div>
            </div>
        </div>
    </div>

    <div id="edit-modal">
        <h3>Data Atribut Bangunan <span id="modal-id-text" style="font-size: 10px; color:#555; display:block;"></span></h3>
        <label>Nomor Induk Bidang (NIB):</label>
        <input type="text" id="input-nib" placeholder="Contoh: 08010101...">
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>Tinggi (m):</label>
                <input type="number" id="input-tinggi" step="0.1">
            </div>
            <div style="flex:1;">
                <label>Luas (m²):</label>
                <input type="number" id="input-luas" step="0.1">
            </div>
        </div>

        <label>Fungsi Bangunan:</label>
        <select id="input-fungsi">
            <option value="Permukiman">Permukiman</option>
            <option value="Sekolah">Sekolah / Pendidikan</option>
            <option value="Komersial">Komersial / Bisnis</option>
            <option value="Pemerintahan">Pemerintahan</option>
            <option value="Fasum">Fasilitas Umum</option>
        </select>
        <div class="btn-group">
            <button class="btn-blue" onclick="saveBuildingData()">💾 Simpan ke Cloud</button>
            <button class="btn-red" onclick="closeEditModal()">Batal</button>
        </div>
    </div>

    <script>
        // INISIALISASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCCrKjd0u-g6612xjh37Ib808ZZTS3CN7Q",
            authDomain: "electric-armor-432617-k8.firebaseapp.com",
            databaseURL: "https://electric-armor-432617-k8-default-rtdb.firebaseio.com", 
            projectId: "electric-armor-432617-k8",
            storageBucket: "electric-armor-432617-k8.firebasestorage.app",
            messagingSenderId: "542873343960",
            appId: "1:542873343960:web:068a3b615d09374f6f04ad",
            measurementId: "G-SG9MGH4BKR"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // NAMA USER & TRACKING ONLINE
        const userName = prompt("Masukkan nama Anda (untuk absensi live):", "Surveyor-" + Math.floor(Math.random() * 100));
        const userId = 'user_' + Date.now();
        const myPresenceRef = db.ref('users_online/' + userId);

        firebase.database().ref('.info/connected').on('value', function(snap) {
            const syncStatus = document.getElementById('sync-status');
            if (snap.val() === true) {
                syncStatus.innerText = "🟢 Tersambung (Realtime)";
                syncStatus.style.background = "#4CAF50"; syncStatus.style.color = "white";
                
                // Tambah diri ke list online, hapus otomatis kalau close tab/mati internet
                myPresenceRef.onDisconnect().remove();
                myPresenceRef.set({ name: userName || "Anonim", time: Date.now() });
            } else {
                syncStatus.innerText = "🔴 Offline / Terputus";
                syncStatus.style.background = "#f44336"; syncStatus.style.color = "white";
            }
        });

        // Tampilkan List User Online
        db.ref('users_online').on('value', (snap) => {
            const users = snap.val() || {};
            const names = Object.values(users).map(u => u.name);
            document.getElementById('online-users-list').innerText = names.length > 0 ? names.join(', ') : "Hanya Anda";
        });

        // VARIABEL GLOBAL
        let updateCounter = 0;
        let buildingData = { type: "FeatureCollection", features: [] };        
        let batasData = null; 
        let selectedFeature = null;

        // VARIABEL GPS & DIGITASI
        let userLocation = null;
        let isDrawing = false;
        let drawPoints = [];

        // BASEMAPS
        const BASEMAPS = {
            dark: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            light: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
            satellite: { version: 8, sources: { esri: { type: 'raster', tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize: 256 } }, layers: [{ id: 'satellite', type: 'raster', source: 'esri' }] }
        };

        // SETUP DECK.GL
        const deckgl = new deck.DeckGL({
            container: 'map',
            mapStyle: BASEMAPS.satellite, // Default satelit agar mudah digitasi lapangan
            initialViewState: { longitude: 105.3055, latitude: -5.3625, zoom: 16, pitch: 45, bearing: 0 },
            controller: true,
            layers: [],
            getCursor: () => isDrawing ? 'crosshair' : 'grab',
            onClick: handleMapClick
        });

        function changeBasemap() { deckgl.setProps({ mapStyle: BASEMAPS[document.getElementById('basemap-selector').value] }); }

        function getBuildingColor(fungsi, isNew) {
            if (isNew) return [255, 100, 100, 255]; // Warna beda (merah muda) untuk bangunan baru digambar
            const f = fungsi ? fungsi.toLowerCase() : '';
            if (f.includes('sekolah') || f.includes('pendidikan')) return [255, 51, 51, 230]; 
            if (f.includes('komersial') || f.includes('bisnis')) return [51, 136, 255, 230];  
            if (f.includes('pemerintahan')) return [170, 51, 255, 230]; 
            if (f.includes('fasum') || f.includes('umum')) return [51, 255, 136, 230]; 
            return [255, 204, 0, 220]; 
        }

        // AKTIFKAN GPS (TRACKING LOKASI HP)
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((position) => {
                userLocation = [position.coords.longitude, position.coords.latitude];
                updateMap(); // Render ulang peta dengan posisi baru
            }, (error) => {
                console.log("GPS Tertutup / Tidak diizinkan.");
            }, { enableHighAccuracy: true });
        }

        async function loadData() {
            try {
                // Gunakan try-catch per fetch agar web tetap jalan jika file lokal ga ada
                try {
                    const batasRes = await fetch('./batas_kecamatan.geojson');
                    if (batasRes.ok) batasData = await batasRes.json();
                } catch(e) { console.log("Batas kecamatan tidak dimuat."); }

                try {
                    const bangunanRes = await fetch('./export_lod1_dengan_tinggi.geojson');
                    if (bangunanRes.ok) {
                        const bangunanRaw = await bangunanRes.json();
                        bangunanRaw.features.forEach((bgn, idx) => { bgn.properties._id = `bgn_lama_${idx}`; });
                        buildingData.features = bangunanRaw.features;
                    }
                } catch(e) { console.log("Bangunan eksisting tidak dimuat, mulai dari kosong."); }

                // LISTEN KE FIREBASE: EDIT BANGUNAN LAMA
                db.ref('edits_bandar_lampung').on('value', (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        buildingData.features.forEach(bgn => {
                            if (cloudData[bgn.properties._id]) { Object.assign(bgn.properties, cloudData[bgn.properties._id]); }
                        });
                        updateCounter++; updateMap(); 
                    }
                });

                // LISTEN KE FIREBASE: BANGUNAN BARU (HASIL DIGITASI ORANG LAIN/KITA)
                db.ref('new_buildings_bandar_lampung').on('value', (snapshot) => {
                    const newBldgs = snapshot.val();
                    if (newBldgs) {
                        // Bersihkan feature baru yg lama dari array agar tidak duplikat
                        buildingData.features = buildingData.features.filter(f => !f.properties.isNew);
                        // Masukkan semua data baru dari cloud
                        Object.values(newBldgs).forEach(feature => {
                            buildingData.features.push(feature);
                        });
                        updateCounter++; updateMap();
                    }
                    document.getElementById('total-bangunan').innerText = `Total Objek: ${buildingData.features.length}`;
                });

                updateMap(); 

            } catch (error) { console.error("Error utama:", error); }
        }

        loadData();

        // HANDLE KLIK PADA PETA
        function handleMapClick(info) {
            // Jika sedang mode gambar, tangkap koordinatnya
            if (isDrawing && info.coordinate) {
                drawPoints.push(info.coordinate);
                updateMap();
                return;
            }
            // Jika mode normal, buka modal edit jika klik bangunan
            if (info.object) openEditModal(info.object);
        }

        function updateMap() {
            const layers = [];

            // Layer Batas
            if (batasData) {
                layers.push(new deck.GeoJsonLayer({
                    id: 'batas-area', data: batasData,
                    filled: true, getFillColor: [0, 200, 255, 10], stroked: true, getLineColor: [0, 200, 255, 255], lineWidthMinPixels: 2, pickable: false 
                }));
            }

            // Layer Bangunan 3D
            if (buildingData.features.length > 0) {
                layers.push(new deck.GeoJsonLayer({
                    id: 'bangunan-3d', data: buildingData, 
                    filled: true, extruded: true, wireframe: true, opacity: 0.9,
                    getElevation: d => parseFloat(d.properties.height_m) || 4, 
                    getFillColor: d => getBuildingColor(d.properties.fungsi, d.properties.isNew), 
                    getLineColor: [255, 255, 255, 80], 
                    autoHighlight: true, highlightColor: [255, 255, 255, 150], pickable: !isDrawing,
                    updateTriggers: { getElevation: updateCounter, getFillColor: updateCounter },
                    onHover: info => {
                        const tooltip = document.getElementById('tooltip');
                        if (info.object && !isDrawing) {
                            const p = info.object.properties;
                            let luas = p.luas_bangunan;
                            if(!luas) { try { luas = turf.area(info.object).toFixed(2); } catch (e) { luas = "0"; } }
                            
                            tooltip.style.display = 'block';
                            tooltip.style.left = info.x + 15 + 'px'; tooltip.style.top = info.y + 15 + 'px';
                            tooltip.style.innerHTML = `
                                <div style="color: #00c8ff; font-weight: bold; margin-bottom: 5px;">${p.isNew ? 'Bangunan Baru' : 'Data Bangunan'}</div>
                                <b>NIB:</b> ${p.NIB || '-'}<br/>
                                <b>Fungsi:</b> ${p.fungsi || 'Permukiman'}<br/>
                                <b>Tinggi:</b> ${p.height_m || 0} m<br/>
                                <b>Luas:</b> ${luas} m²
                            `;
                        } else { tooltip.style.display = 'none'; }
                    }
                }));
            }

            // Layer Posisi GPS Kita (Titik Biru)
            if (userLocation) {
                layers.push(new deck.ScatterplotLayer({
                    id: 'lokasi-user',
                    data: [{ position: userLocation }],
                    getPosition: d => d.position,
                    getFillColor: [0, 150, 255, 255],
                    getRadius: 8,
                    radiusUnits: 'meters',
                    stroked: true, getLineColor: [255, 255, 255, 255], lineWidthMinPixels: 2
                }));
            }

            // Layer Visualisasi Saat Menggambar Digitasi
            if (isDrawing && drawPoints.length > 0) {
                layers.push(new deck.ScatterplotLayer({
                    id: 'draw-points',
                    data: drawPoints.map(p => ({position: p})),
                    getPosition: d => d.position,
                    getFillColor: [255, 50, 50],
                    getRadius: 2, radiusUnits: 'meters'
                }));
                if (drawPoints.length > 1) {
                    layers.push(new deck.PathLayer({
                        id: 'draw-lines',
                        data: [{path: drawPoints}],
                        getPath: d => d.path,
                        getColor: [255, 50, 50, 200],
                        getWidth: 2, widthUnits: 'pixels'
                    }));
                }
            }

            deckgl.setProps({ layers: layers });
        }

        // FUNGSI DIGITASI (MENGGAMBAR POLIGON)
        function toggleDrawMode() {
            isDrawing = true; drawPoints = [];
            document.getElementById('draw-panel').style.display = 'block';
            document.getElementById('btn-draw').style.display = 'none';
            updateMap();
        }

        function cancelDrawing() {
            isDrawing = false; drawPoints = [];
            document.getElementById('draw-panel').style.display = 'none';
            document.getElementById('btn-draw').style.display = 'block';
            updateMap();
        }

        function finishDrawing() {
            if (drawPoints.length < 3) return alert("Minimal buat 3 titik untuk jadi bangunan!");
            
            // Tutup poligon (titik akhir = titik awal)
            const polyCoords = [...drawPoints, drawPoints[0]];
            
            // Buat objek GeoJSON baru
            const newFeature = turf.polygon([polyCoords], {
                _id: 'bgn_baru_' + Date.now(),
                isNew: true, // penanda ini hasil digitasi baru
                NIB: '', height_m: 4, luas_bangunan: 0, fungsi: 'Permukiman'
            });

            cancelDrawing(); // Keluar dari mode gambar
            openEditModal(newFeature); // Langsung buka form atribut
        }

        // FUNGSI MODAL & SIMPAN DATA
        function openEditModal(feature) {
            selectedFeature = feature;
            const p = feature.properties;
            let calculatedArea = 0;
            try { calculatedArea = turf.area(feature).toFixed(2); } catch (e) {}

            document.getElementById('modal-id-text').innerText = `ID: ${p._id}`;
            document.getElementById('input-nib').value = p.NIB || '';
            document.getElementById('input-tinggi').value = p.height_m || (p.isNew ? 4 : '');
            document.getElementById('input-luas').value = p.luas_bangunan || calculatedArea;
            
            const fungsiSelect = document.getElementById('input-fungsi');
            if(p.fungsi) {
                let found = Array.from(fungsiSelect.options).some(opt => opt.value === p.fungsi);
                fungsiSelect.value = found ? p.fungsi : 'Permukiman';
            } else { fungsiSelect.value = 'Permukiman'; }

            document.getElementById('edit-modal').style.display = 'block';
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; selectedFeature = null; }

        function saveBuildingData() {
            if (!selectedFeature) return;
            const id = selectedFeature.properties._id;
            const isNew = selectedFeature.properties.isNew;
            
            const updatedProps = {
                NIB: document.getElementById('input-nib').value,
                height_m: parseFloat(document.getElementById('input-tinggi').value) || 0,
                luas_bangunan: parseFloat(document.getElementById('input-luas').value) || 0,
                fungsi: document.getElementById('input-fungsi').value
            };

            if (isNew) {
                // Jika bangunan baru, simpan *keseluruhan objek* (Geometri + Atribut) ke tabel baru
                selectedFeature.properties = { ...selectedFeature.properties, ...updatedProps };
                db.ref('new_buildings_bandar_lampung/' + id).set(selectedFeature)
                  .then(() => closeEditModal()).catch(e => alert("Gagal Simpan GPS!"));
            } else {
                // Jika bangunan lama, update atributnya saja
                db.ref('edits_bandar_lampung/' + id).update(updatedProps)
                  .then(() => closeEditModal()).catch(e => alert("Gagal Simpan!"));
            }
        }

        // DOWNLOAD GABUNGAN (BANGUNAN LAMA + BARU)
        function downloadUpdatedData() {
            if (!buildingData || buildingData.features.length === 0) return alert("Data kosong!");
            const cleanData = JSON.parse(JSON.stringify(buildingData));
            
            // Rapihkan properties sebelum didownload
            cleanData.features.forEach(bgn => { delete bgn.properties._id; delete bgn.properties.isNew; });
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cleanData));
            const a = document.createElement('a');
            a.href = dataStr; a.download = "hasil_kadaster_pro_final.geojson";
            document.body.appendChild(a); a.click(); a.remove();
        }
    </script>
</body>
</html>
